<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>我爱王圆月</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    /* 核心修改：浪漫温馨的粉金渐变背景 */
    background: linear-gradient(135deg, #FFC0CB 0%, #FFD700 50%, #FFE4E1 100%);
    font-family: "Microsoft YaHei", sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  
  /* ================= 页面大框架 ================= */
  .top-section {
    height: 48vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    padding: 0 40px;
  }
  
  .content-box {
    width: 100%;
    max-width: 800px;
    height: 90%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: relative;
  }
  
  /* ================= 蝴蝶与月亮 专属羁绊互动 ================= */
  .element-box {
    font-size: 110px;
    cursor: pointer;
    user-select: none;
    position: relative;
    transition: transform 0.2s;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.15));
  }

  /* 羁绊喊话气泡样式 */
  .shout-bubble {
    position: absolute;
    top: -50px;
    font-size: 26px;
    font-weight: 900;
    background: #fff;
    color: #000;
    padding: 6px 14px;
    border-radius: 20px;
    border: 3px solid #000;
    opacity: 0;
    transform: scale(0);
    transition: all 0.2s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .shout-bubble.show {
    opacity: 1;
    transform: scale(1);
  }
  
  /* 蝴蝶飞扑轨迹 (喊那路途) */
  #butterflyActor.naruto-action {
    animation: butterflyFly 0.5s ease-in-out;
  }
  @keyframes butterflyFly {
    0% { transform: scale(1) translateX(0) rotate(0deg); }
    30% { transform: scale(1.1) translateX(-20px) rotate(-10deg); }
    65% { transform: scale(1.2) translateX(260px) translateY(-15px) rotate(15deg); }
    100% { transform: scale(1) translateX(0) rotate(0deg); }
  }

  /* 月亮撞击轨迹 (喊萨斯给) */
  #moonTarget.sasuke-action {
    animation: moonBash 0.5s ease-in-out;
  }
  @keyframes moonBash {
    0% { transform: scale(1) translateX(0) rotate(0deg); }
    30% { transform: scale(1.1) translateX(20px) rotate(10deg); }
    65% { transform: scale(1.2) translateX(-260px) translateY(-15px) rotate(-15deg); }
    100% { transform: scale(1) translateX(0) rotate(0deg); }
  }

  /* 被击中后的娇羞晃动 */
  .element-box.hit-shake {
    animation: targetShake 0.5s ease-in-out;
  }
  @keyframes targetShake {
    0% { transform: scale(1) translate(0, 0); }
    20% { transform: scale(1.2) translate(-10px, 10px) rotate(-10deg); }
    40% { transform: scale(1.1) translate(10px, -10px) rotate(10deg); }
    60% { transform: scale(1.1) translate(-5px, -5px) rotate(-5deg); }
    80% { transform: scale(1.05) translate(5px, 5px) rotate(5deg); }
    100% { transform: scale(1) translate(0, 0); }
  }

  /* ================= 中间旋转文字（我爱王圆月呀） ================= */
  .circle-text-wrap {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
  }
  
  /* 中心发光大心，与背景拉开对比 */
  .center-heart {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    z-index: 2;
    filter: drop-shadow(0 0 15px #FF1493) drop-shadow(0 4px 10px rgba(0,0,0,0.2));
    animation: heartThrob 1.2s ease-in-out infinite;
  }
  @keyframes heartThrob {
    0%, 100% { transform: translate(-50%, -50%) scale(1); }
    50% { transform: translate(-50%, -50%) scale(1.15); }
  }
  
  .rotate-ring {
    width: 100%;
    height: 100%;
    position: relative;
    animation: spin 7s linear infinite;
  }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }
  
  /* 字体橘粉与亮金交替，加黑色边框立体感 */
  .rotate-text {
    position: absolute;
    font-size: 64px; 
    font-weight: 900;
    left: 50%;
    top: 50%;
    transform-origin: center center;
    text-shadow: 3px 3px 0px #000;
  }
  .text-1 { color: #FF69B4; transform: translate(-50%, -170px); } /* 我 - 粉 */
  .text-2 { color: #FF8C00; transform: translate(110px, -110px); } /* 爱 - 橘 */
  .text-3 { color: #FF69B4; transform: translate(110px, 40px); }   /* 王 - 粉 */
  .text-4 { color: #FF8C00; transform: translate(-50%, 100px); }   /* 圆 - 橘 */
  .text-5 { color: #FF69B4; transform: translate(-200px, 40px); }  /* 月 - 粉 */
  .text-6 { color: #FF8C00; transform: translate(-200px, -110px); }/* 呀 - 橘 */
  
  /* ================= 中部文案区 ================= */
  .middle-section {
    height: 28vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 0 10px;
    position: relative;
  }

  /* 专属神仙主句样式 */
  .main-title {
    font-size: 38px;
    font-weight: 900;
    text-align: center;
    color: #fff;
    letter-spacing: 2px;
    text-shadow: 
      2px 2px 0px #FF1493,
      4px 4px 0px #000;
    margin-bottom: 5px;
    z-index: 5;
  }

  .sub-title {
    font-size: 26px; 
    font-weight: bold;
    color: #333;
    text-align: center;
    background: rgba(255,255,255,0.4);
    padding: 6px 20px;
    border-radius: 30px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    z-index: 5;
  }

  /* ================= 底部互动区 ================= */
  .bottom-section {
    height: 24vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }
  .question {
    font-size: 38px;
    font-weight: bold;
    color: #000;
    text-shadow: 1px 1px 2px rgba(255,255,255,0.6);
  }
  .btn-group {
    display: flex;
    gap: 80px;
  }
  .btn {
    padding: 14px 45px;
    font-size: 26px;
    border: 3px solid #000;
    border-radius: 40px;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.2s;
    background: #fff;
    color: #000;
    box-shadow: 4px 4px 0px #000;
  }
  .btn:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0px #000;
  }
  
  /* 成功表白大浮层 */
  .success-popup {
    position: fixed;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-size: 70px;
    font-weight: bold;
    color: #fff;
    background: rgba(0,0,0,0.85);
    padding: 40px;
    border-radius: 30px;
    border: 4px solid #FF1493;
    z-index: 100;
    pointer-events: none;
    transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
    width: 90%;
    max-width: 600px;
  }
  .success-popup.show {
    transform: translate(-50%, -50%) scale(1);
  }

  /* 飞散粒子效果 */
  .particle {
    position: absolute;
    font-size: 40px;
    pointer-events: none;
    animation: particleMove 0.8s ease-out forwards;
    z-index: 100;
  }
  @keyframes particleMove {
    0% { transform: translate(0, 0) scale(0.6); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(1.5); opacity: 0; }
  }
  
  /* ================= 移动端适配 ================= */
  @media screen and (max-width: 768px) {
    .element-box { font-size: 80px; }
    .shout-bubble { font-size: 18px; top: -35px; }
    
    @keyframes butterflyFly {
      0% { transform: scale(1) translateX(0); }
      65% { transform: scale(1.2) translateX(140px) translateY(-10px); }
      100% { transform: scale(1) translateX(0); }
    }
    @keyframes moonBash {
      0% { transform: scale(1) translateX(0); }
      65% { transform: scale(1.2) translateX(-140px) translateY(-10px); }
      100% { transform: scale(1) translateX(0); }
    }

    .circle-text-wrap { width: 200px; height: 200px; }
    .center-heart { font-size: 70px; }
    .rotate-text { font-size: 40px; }
    .text-1 { transform: translate(-50%, -110px); }
    .text-2 { transform: translate(65px, -75px); }
    .text-3 { transform: translate(65px, 20px); }
    .text-4 { transform: translate(-50%, 60px); }
    .text-5 { transform: translate(-115px, 20px); }
    .text-6 { transform: translate(-115px, -75px); }
    
    .main-title { font-size: 24px; text-shadow: 1px 1px 0px #FF1493, 2px 2px 0px #000; }
    .sub-title { font-size: 18px; }
    .question { font-size: 28px; }
    .btn { padding: 10px 30px; font-size: 20px; }
    .success-popup { font-size: 40px; }
  }
</style>
</head>
<body>

  <!-- 顶部区域 -->
  <div class="top-section">
    <div class="content-box">
      <!-- 蝴蝶 (喊那路途) -->
      <div class="element-box" id="butterflyActor" onclick="butterflyShout()">
        <div class="shout-bubble" id="bubbleNaruto">那路途！📢</div>
        🦋
      </div>
      
      <!-- 中间旋转文字 -->
      <div class="circle-text-wrap">
        <div class="center-heart">💖</div>
        <div class="rotate-ring">
          <div class="rotate-text text-1">我</div>
          <div class="rotate-text text-2">爱</div>
          <div class="rotate-text text-3">王</div>
          <div class="rotate-text text-4">圆</div>
          <div class="rotate-text text-5">月</div>
          <div class="rotate-text text-6">呀</div>
        </div>
      </div>
      
      <!-- 月亮 (喊萨斯给) -->
      <div class="element-box" id="moonTarget" onclick="moonShout()">
        <div class="shout-bubble" id="bubbleSasuke">萨斯给！📢</div>
        🌙
      </div>
    </div>
  </div>
  
  <!-- 中部区域 -->
  <div class="middle-section">
    <div class="main-title">月亮走我也走，我陪圆月到永久</div>
    <div class="sub-title">满天繁星，你是我唯一的偏心 🌟</div>
  </div>
  
  <!-- 底部区域 -->
  <div class="bottom-section">
    <div class="question">今天也一样超级爱王圆月吗？</div>
    <div class="btn-group">
      <button class="btn" onclick="loveYes()">爱！</button>
      <!-- 核心修改：点击无情输出“滚！” -->
      <button class="btn" onclick="loveNo()">不爱</button>
    </div>
  </div>
  
  <!-- 成功弹窗 -->
  <div class="success-popup" id="popupBox">圆月收到啦！💖<br>( ˘ ³˘)♥ 再喊一声羁绊！</div>

<script>
  let isAnimating = false;

  function clearAllClasses() {
    const bf = document.getElementById("butterflyActor");
    const moon = document.getElementById("moonTarget");
    bf.classList.remove("naruto-action", "hit-shake");
    moon.classList.remove("sasuke-action", "hit-shake");
    void bf.offsetWidth;
    void moon.offsetWidth;
  }

  // 1. 蝴蝶飞向月亮，喊“那路途”
  function butterflyShout() {
    if (isAnimating) return;
    isAnimating = true;
    clearAllClasses();

    const bf = document.getElementById("butterflyActor");
    const moon = document.getElementById("moonTarget");
    const bubble = document.getElementById("bubbleNaruto");

    // 弹出喊话气泡
    bubble.classList.add("show");
    bf.classList.add("naruto-action");

    // 击中时刻：爆金色流星，月亮挨揍晃动
    setTimeout(() => {
      moon.classList.add("hit-shake");
      createParticles(moon, ['✨', '🌟', '💫', '💛']);
    }, 320);

    // 动作收尾
    setTimeout(() => {
      bubble.classList.remove("show");
      isAnimating = false;
    }, 800);
  }

  // 2. 月亮冲向蝴蝶，喊“萨斯给”
  function moonShout() {
    if (isAnimating) return;
    isAnimating = true;
    clearAllClasses();

    const bf = document.getElementById("butterflyActor");
    const moon = document.getElementById("moonTarget");
    const bubble = document.getElementById("bubbleSasuke");

    // 弹出喊话气泡
    bubble.classList.add("show");
    moon.classList.add("sasuke-action");

    // 击中时刻：爆粉色爱心，蝴蝶挨揍晃动
    setTimeout(() => {
      bf.classList.add("hit-shake");
      createParticles(bf, ['❤️', '💖', '💝', '🌸']);
    }, 320);

    // 动作收尾
    setTimeout(() => {
      bubble.classList.remove("show");
      isAnimating = false;
    }, 800);
  }

  // 特效生成器
  function createParticles(element, emojiArray) {
    const rect = element.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;

    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.innerText = emojiArray[Math.floor(Math.random() * emojiArray.length)];
      p.style.left = centerX + 'px';
      p.style.top = centerY + 'px';
      
      const angle = Math.random() * Math.PI * 2;
      const distance = 60 + Math.random() * 120;
      const x = Math.cos(angle) * distance;
      const y = Math.sin(angle) * distance;
      
      p.style.setProperty('--x', `${x}px`);
      p.style.setProperty('--y', `${y}px`);
      
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 800);
    }
  }

  // 核心修改：无情拒绝弹窗
  function loveNo() {
    alert("滚！");
  }
  
  function loveYes() {
    const box = document.getElementById("popupBox");
    box.classList.add("show");
    setTimeout(() => {
      box.classList.remove("show");
    }, 3500);
  }
</script>
</body>
</html>
